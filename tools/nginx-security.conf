# ═══════════════════════════════════════════════════════════════
# NGINX Security Configuration for SocialTradingVlog
# Include this in your main nginx server block:
#   include /var/www/socialtradingvlog-website/tools/nginx-security.conf;
# ═══════════════════════════════════════════════════════════════

# ── Block access to sensitive directories ─────────────────────
location ~ ^/(tools|logs|data|outreach|reports|backups|\.git) {
    deny all;
    return 404;
}

# ── Block access to hidden files ──────────────────────────────
location ~ /\. {
    deny all;
    return 404;
}

# ── Block access to config/script files ───────────────────────
location ~* \.(py|sh|json|pickle|env|log|md|jsonl)$ {
    deny all;
    return 404;
}

# ── Security headers ─────────────────────────────────────────
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://i.ytimg.com data:; connect-src 'self' https://www.google-analytics.com; frame-src https://www.youtube.com;" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Rate limiting ─────────────────────────────────────────────
# Define rate limit zone in http block:
#   limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

# Apply to API endpoints
location /api/ {
    limit_req zone=api burst=10 nodelay;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# ── Block common attack paths ────────────────────────────────
location ~* (wp-admin|wp-login|wp-content|xmlrpc|phpmyadmin|\.php$) {
    deny all;
    return 444;
}

# ── Limit request body size ──────────────────────────────────
client_max_body_size 1m;

# ── Disable server tokens ───────────────────────────────────
# Add to http block: server_tokens off;
